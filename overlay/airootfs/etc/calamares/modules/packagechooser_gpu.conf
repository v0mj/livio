---
mode: required
method: netinstall-select

labels:
  step: "Graphics"

default: gpu-open

items:
  - id: gpu-open
    name: "AMD / Intel (Mesa)"
    description: "Use the default open-source graphics stack. This is recommended for AMD, Intel and most virtual machines."
  - id: gpu-nvidia
    name: "NVIDIA Proprietary"
    description: "Install the proprietary NVIDIA stack with DKMS support for the installed kernels."
  - id: gpu-hybrid
    name: "Hybrid / Multi-vendor"
    description: "Install both Mesa and NVIDIA proprietary packages for mixed-GPU hardware or uncertain laptops."
